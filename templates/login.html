{% extends "base.html" %}
{% block title %}Kirish — NexBank{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-left">
    <a href="{{ url_for('index') }}" class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">Nex<b>Bank</b></span>
    </a>
    <div class="auth-left-content">
      <h2>Qaytib keldingiz!</h2>
      <p>NexBank hisobingizga xavfsiz kiring va bank operatsiyalaringizni boshqaring.</p>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-box">
      <h1>Hisobga kirish</h1>
      <p class="auth-sub">Email va parolingizni kiriting</p>
      <form method="POST" class="auth-form">
        <div class="form-group">
          <label>Email manzil</label>
          <input type="email" name="email" required placeholder="aziz@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Parol</label>
          <div class="pw-wrap">
            <input type="password" name="password" required placeholder="Parolingiz" id="pw" autocomplete="current-password"/>
            <button type="button" class="pw-toggle" onclick="togglePw('pw')">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-primary btn-full btn-lg">Kirish →</button>
      </form>
      <p class="auth-switch">Hisobingiz yo'qmi? <a href="{{ url_for('register') }}">Ro'yxatdan o'tish</a></p>
    </div>
  </div>
</div>
{% endblock %}
