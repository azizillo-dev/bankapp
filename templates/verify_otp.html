{% extends "base.html" %}
{% block title %}Tasdiqlash — NexBank{% endblock %}
{% block body %}
<div class="auth-page auth-center">
  <div class="auth-box otp-box">
    <div class="otp-icon">📧</div>
    <h1>Email tasdiqlash</h1>
    <p class="auth-sub">Emailingizga yuborilgan 6 xonali kodni kiriting</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Tasdiqlash kodi</label>
        <input type="text" name="code" required placeholder="_ _ _ _ _ _"
               maxlength="6" pattern="\d{6}" inputmode="numeric"
               class="otp-input" autocomplete="one-time-code"/>
      </div>
      <button type="submit" class="btn-primary btn-full btn-lg">Tasdiqlash →</button>
    </form>
    <p class="auth-sub" style="margin-top:16px;font-size:13px;">
      Kod 10 daqiqa davomida amal qiladi.<br/>
      <a href="{{ url_for('login') if purpose == 'login' else url_for('register') }}">← Orqaga qaytish</a>
    </p>
  </div>
</div>
{% endblock %}
